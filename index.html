<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Baird Wang — Portfolio</title>
  <style>
    :root {
      --bg: #000000;
      --text: #f2ece4;
      --text-muted: rgba(242, 236, 228, 0.55);
      --gap: clamp(1rem, 2.5vw, 2rem);
      --max: 1200px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      letter-spacing: 0.01em;
    }

    .page {
      max-width: var(--max);
      margin: 0 auto;
      padding: clamp(2.5rem, 8vw, 5rem) clamp(1.25rem, 5vw, 3rem) clamp(4rem, 12vw, 7rem);
    }

    header {
      margin-bottom: clamp(3rem, 10vw, 5.5rem);
    }

    .name {
      margin: 0;
      font-size: clamp(1.125rem, 2.5vw, 1.35rem);
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .works {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap);
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .work {
      margin: 0;
    }

    .work a {
      display: block;
      color: inherit;
      text-decoration: none;
      outline-offset: 4px;
    }

    .thumb {
      position: relative;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: #111;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.35s ease, transform 0.45s ease;
    }

    .work a:hover .thumb img,
    .work a:focus-visible .thumb img {
      opacity: 0.92;
      transform: scale(1.02);
    }

    .caption {
      margin-top: 0.85rem;
      font-size: 0.8125rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    @media (max-width: 900px) {
      .works {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 520px) {
      .works {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <h1 class="name">Baird Wang</h1>
    </header>

    <ul class="works" aria-label="Selected work">
      <li class="work">
        <a href="#">
          <div class="thumb">
            <img
              src="https://picsum.photos/seed/baird-wang-01/800/600"
              alt="Project 1 placeholder"
              width="800"
              height="600"
              loading="lazy"
            />
          </div>
          <p class="caption">Project One</p>
        </a>
      </li>
      <li class="work">
        <a href="#">
          <div class="thumb">

            />
          </div>

        </a>
      </li>
      <li class="work">

            />

      </li>
      <li class="work">
        <a href="#">

              width="800"
              height="600"

            />
          </div>

      </li>
      <li class="work">
        <a href="#">
          <div class="thumb">

              src="https://picsum.photos/seed/baird-wang-05/800/600"
              alt="Project 5 placeholder"
              width="800"

            />
          </div>

        </a>

      <li class="work">

</body>
</html>
